name: Release Workflow
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to release from'
        required: false
        default: 'main'

permissions:
  id-token: write
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'Apitomy'
    outputs:
      release-version: ${{ steps.versions.outputs.release-version }}
      snapshot-version: ${{ steps.versions.outputs.snapshot-version }}
    steps:

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          maven-version: '3.8.5'


      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22


      - name: Set up settings.xml
        run: |
          echo "<settings><servers><server><id>central</id><username>${{ secrets.CENTRAL_USERNAME }}</username><password>${{ secrets.CENTRAL_TOKEN }}</password></server></servers><profiles><profile><id>central</id><activation><activeByDefault>true</activeByDefault></activation><properties><gpg.executable>gpg</gpg.executable></properties></profile></profiles></settings>" > /home/runner/.m2/settings.xml
          cat /home/runner/.m2/settings.xml


      - name: Cache Dependencies
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-


      - name: Apitomy Data Models Code Checkout
        run: |
          git init
          git config --global user.name "apitomy-ci"
          git config --global user.email "apitomy.ci@gmail.com"
          git remote add origin "https://apitomy-ci:${{ secrets.ACCESS_TOKEN }}@github.com/$GITHUB_REPOSITORY.git"
          git fetch
          git checkout ${{ inputs.branch }}
          git branch --set-upstream-to=origin/${{ inputs.branch }}
          git pull
          echo "#### Listing files after clone ####"
          find .


      - name: Compute Release and Snapshot Versions
        id: versions
        run: |
          CURRENT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          RELEASE_VERSION="${CURRENT_VERSION%-SNAPSHOT}"
          MAJOR=$(echo "$RELEASE_VERSION" | cut -d. -f1)
          MINOR=$(echo "$RELEASE_VERSION" | cut -d. -f2)
          PATCH=$(echo "$RELEASE_VERSION" | cut -d. -f3)
          NEXT_PATCH=$((PATCH + 1))
          SNAPSHOT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}-SNAPSHOT"
          echo "release-version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "snapshot-version=$SNAPSHOT_VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $RELEASE_VERSION"
          echo "Next snapshot version: $SNAPSHOT_VERSION"


      - name: Update Release Version ${{ steps.versions.outputs.release-version }}
        run: mvn versions:set -DnewVersion=${{ steps.versions.outputs.release-version }} -DgenerateBackupPoms=false -DprocessAllModules=true


      - name: Verify Build
        run: mvn clean install -Ptranspilation
        env:
          MAVEN_OPTS: "-Dfile.encoding=UTF-8 --add-opens=java.base/java.net=ALL-UNNAMED --add-opens jdk.compiler/com.sun.tools.javac.api=ALL-UNNAMED --add-opens jdk.compiler/com.sun.tools.javac.code=ALL-UNNAMED --add-opens jdk.compiler/com.sun.tools.javac.file=ALL-UNNAMED --add-opens jdk.compiler/com.sun.tools.javac.model=ALL-UNNAMED --add-opens jdk.compiler/com.sun.tools.javac.parser=ALL-UNNAMED --add-opens jdk.compiler/com.sun.tools.javac.tree=ALL-UNNAMED --add-opens jdk.compiler/com.sun.tools.javac.util=ALL-UNNAMED"


      - name: Commit Release Version Change
        run: |
          git add .
          git commit -m "Automated version update: ${{ steps.versions.outputs.release-version }}"
          git push


      - name: Create GitHub Release
        run: ./.github/scripts/create-github-release.sh ${{ steps.versions.outputs.release-version }} ${{ inputs.branch }}
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}


  maven-publish:
    needs: release
    uses: ./.github/workflows/maven-publish.yaml
    with:
      release-version: ${{ needs.release.outputs.release-version }}
      branch: ${{ inputs.branch }}
    secrets: inherit


  npm-publish:
    needs: release
    uses: ./.github/workflows/npm-publish.yaml
    with:
      release-version: ${{ needs.release.outputs.release-version }}
      branch: ${{ inputs.branch }}
    secrets: inherit


  finalize:
    needs: [release, maven-publish, npm-publish]
    runs-on: ubuntu-latest
    if: always() && needs.release.result == 'success'
    steps:

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          maven-version: '3.8.5'


      - name: Code Checkout
        run: |
          git init
          git config --global user.name "apitomy-ci"
          git config --global user.email "apitomy.ci@gmail.com"
          git remote add origin "https://apitomy-ci:${{ secrets.ACCESS_TOKEN }}@github.com/$GITHUB_REPOSITORY.git"
          git fetch
          git checkout ${{ inputs.branch }}
          git branch --set-upstream-to=origin/${{ inputs.branch }}
          git pull


      - name: Update Snapshot version ${{ needs.release.outputs.snapshot-version }}
        run: mvn versions:set -DnewVersion=${{ needs.release.outputs.snapshot-version }} -DgenerateBackupPoms=false -DprocessAllModules=true


      - name: Commit Snapshot Version Change
        run: |
          git add .
          git commit -m "Automated version update: ${{ needs.release.outputs.snapshot-version }}"
          git push


      - name: Check Publishing Results
        run: |
          echo "Release workflow completed"
          echo "Maven publish status: ${{ needs.maven-publish.result }}"
          echo "NPM publish status: ${{ needs.npm-publish.result }}"
          if [[ "${{ needs.maven-publish.result }}" != "success" ]] || [[ "${{ needs.npm-publish.result }}" != "success" ]]; then
            echo "WARNING: One or more publishing steps failed. You can retry them manually:"
            echo "  - Maven: https://github.com/${{ github.repository }}/actions/workflows/maven-publish.yaml"
            echo "  - NPM: https://github.com/${{ github.repository }}/actions/workflows/npm-publish.yaml"
          fi


      - name: Slack Notification (Always)
        if: always()
        run: |
          MAVEN_STATUS="${{ needs.maven-publish.result }}"
          NPM_STATUS="${{ needs.npm-publish.result }}"
          if [[ "$MAVEN_STATUS" != "success" ]] || [[ "$NPM_STATUS" != "success" ]]; then
            MESSAGE="Release ${{ needs.release.outputs.release-version }} completed with warnings. Maven: $MAVEN_STATUS, NPM: $NPM_STATUS. Manual retry may be needed."
          else
            MESSAGE="Release ${{ needs.release.outputs.release-version }} completed successfully"
          fi
          REPO="${{ github.repository }}"
          LINK="https://github.com/$REPO/actions/runs/${{ github.run_id }}"
          PAYLOAD="{\"workflow\": \"${{ github.workflow }}\", \"status\": \"${{ job.status }}\", \"message\": \"$MESSAGE\", \"link\": \"$LINK\", \"repository\": \"$REPO\"}"
          curl -X POST -H "Content-Type: application/json" -d "$PAYLOAD" ${{ secrets.SLACK_NOTIFICATION_WEBHOOK }}

      - name: Slack Notification (Publishing Failures)
        if: needs.maven-publish.result != 'success' || needs.npm-publish.result != 'success'
        run: |
          MESSAGE="Release ${{ needs.release.outputs.release-version }}: Publishing failures detected. Maven: ${{ needs.maven-publish.result }}, NPM: ${{ needs.npm-publish.result }}. Retry at https://github.com/${{ github.repository }}/actions"
          REPO="${{ github.repository }}"
          LINK="https://github.com/$REPO/actions/runs/${{ github.run_id }}"
          PAYLOAD="{\"workflow\": \"${{ github.workflow }}\", \"status\": \"warning\", \"message\": \"$MESSAGE\", \"link\": \"$LINK\", \"repository\": \"$REPO\"}"
          curl -X POST -H "Content-Type: application/json" -d "$PAYLOAD" ${{ secrets.SLACK_ERROR_WEBHOOK }}
