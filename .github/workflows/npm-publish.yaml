name: NPM Publish Workflow
on:
  workflow_dispatch:
    inputs:
      release-version:
        description: 'Release version to publish (e.g., 2.3.0)'
        required: true
      branch:
        description: 'Branch/tag to publish from'
        required: true
        default: 'main'
  workflow_call:
    inputs:
      release-version:
        description: 'Release version to publish'
        required: true
        type: string
      branch:
        description: 'Branch/tag to publish from'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'Apitomy'
    steps:

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'


      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22


      - name: Log Metadata
        run: |
          echo "Publishing Apitomy Data Models version ${{ inputs.release-version }} to NPM"
          echo "Publishing from branch/tag: ${{ inputs.branch }}"


      - name: Code Checkout
        run: |
          git init
          git config --global user.name "apitomy-ci"
          git config --global user.email "apitomy.ci@gmail.com"
          git remote add origin "https://apitomy-ci:${{ secrets.ACCESS_TOKEN }}@github.com/$GITHUB_REPOSITORY.git"
          git fetch
          git checkout ${{ inputs.branch }}
          echo "#### Listing files after checkout ####"
          find .


      - name: Configure npm for OIDC Trusted Publishing
        run: |
          echo "//registry.npmjs.org/:_authToken=" > ~/.npmrc
          npm config set registry https://registry.npmjs.org/


      - name: Build TypeScript Package
        run: mvn clean install -Ptranspilation -DskipTests
        env:
          MAVEN_OPTS: "-Dfile.encoding=UTF-8 --add-opens=java.base/java.net=ALL-UNNAMED --add-opens jdk.compiler/com.sun.tools.javac.api=ALL-UNNAMED --add-opens jdk.compiler/com.sun.tools.javac.code=ALL-UNNAMED --add-opens jdk.compiler/com.sun.tools.javac.file=ALL-UNNAMED --add-opens jdk.compiler/com.sun.tools.javac.model=ALL-UNNAMED --add-opens jdk.compiler/com.sun.tools.javac.parser=ALL-UNNAMED --add-opens jdk.compiler/com.sun.tools.javac.tree=ALL-UNNAMED --add-opens jdk.compiler/com.sun.tools.javac.util=ALL-UNNAMED"


      - name: Publish to NPM
        run: npm publish --provenance --access public ./data-models/target/ts/


      - name: Slack Notification (Always)
        if: always()
        run: |
          MESSAGE="NPM publish for version ${{ inputs.release-version }} completed with status: ${{ job.status }}"
          REPO="${{ github.repository }}"
          LINK="https://github.com/$REPO/actions/runs/${{ github.run_id }}"
          PAYLOAD="{\"workflow\": \"${{ github.workflow }}\", \"status\": \"${{ job.status }}\", \"message\": \"$MESSAGE\", \"link\": \"$LINK\", \"repository\": \"$REPO\"}"
          curl -X POST -H "Content-Type: application/json" -d "$PAYLOAD" ${{ secrets.SLACK_NOTIFICATION_WEBHOOK }}

      - name: Slack Notification (Error)
        if: failure()
        run: |
          MESSAGE="NPM publish for version ${{ inputs.release-version }} FAILED!"
          REPO="${{ github.repository }}"
          LINK="https://github.com/$REPO/actions/runs/${{ github.run_id }}"
          PAYLOAD="{\"workflow\": \"${{ github.workflow }}\", \"status\": \"${{ job.status }}\", \"message\": \"$MESSAGE\", \"link\": \"$LINK\", \"repository\": \"$REPO\"}"
          curl -X POST -H "Content-Type: application/json" -d "$PAYLOAD" ${{ secrets.SLACK_ERROR_WEBHOOK }}
